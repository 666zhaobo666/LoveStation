<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的爱之回忆 - LoveStation</title>
  
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Reuse Global Glassmorphism CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Dynamic Glowing Background Backdrops -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="app-container detail-page-container">
    
    <!-- HEADER RETURN TOOLBAR -->
    <div class="detail-page-toolbar">
      <a href="/" class="btn btn-secondary back-home-btn">
        <i class="fas fa-arrow-left"></i> 返回主页
      </a>
    </div>

    <!-- MAJESTIC CENTER COLUMN READING BOARD -->
    <main class="detail-full-card glass-panel">
      <!-- Card Title -->
      <h1 id="detail-title" class="detail-title-lg"></h1>
      
      <!-- Metadata Row -->
      <div class="detail-meta-row">
        <span id="detail-date" class="detail-date"><i class="far fa-clock"></i> </span>
        <span id="detail-pill" class="card-days-pill"></span>
      </div>

      <!-- Tag Box -->
      <div id="detail-tags" class="detail-tags-box"></div>

      <hr class="detail-divider">

      <!-- Rich Typography Description -->
      <div class="detail-description-container">
        <p id="detail-desc" class="detail-desc-text"></p>
      </div>

      <hr class="detail-divider">

      <!-- Beautiful Immersive Vertical Photo Stream -->
      <div class="photo-stream-title">
        <i class="far fa-images"></i>
        <h4>精彩瞬间相册</h4>
      </div>
      
      <div id="detail-photos-stream" class="detail-photos-stream">
        <!-- Images will be injected here -->
      </div>
    </main>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (!id) {
        window.location.href = '/';
        return;
      }

      try {
        const res = await fetch('/api/anniversaries');
        const data = await res.json();
        
        const state = {
          togetherSince: (data.settings && data.settings.togetherSince) || '2024-05-20',
          stationTitle: (data.settings && data.settings.title) || '我们的爱之小站',
          favicon: (data.settings && data.settings.favicon) || ''
        };

        // Update favicon dynamically
        const faviconLink = document.querySelector('link[rel="icon"]');
        if (faviconLink) {
          faviconLink.href = state.favicon || "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>❤️</text></svg>";
        }

        const item = (data.anniversaries || []).find(ann => ann.id === id);
        if (!item) {
          document.getElementById('detail-title').textContent = '回忆未找到 💔';
          document.getElementById('detail-desc').textContent = '可能该回忆已经被悄悄删除了呢...';
          return;
        }

        // Render page title and headers
        document.title = `${item.title} - ${state.stationTitle}`;
        document.getElementById('detail-title').textContent = item.title;
        const hasEndDate = item.endDate && item.endDate !== item.date;
        const displayDate = hasEndDate ? `${item.date} ~ ${item.endDate}` : item.date;
        document.getElementById('detail-date').innerHTML = `<i class="far fa-clock"></i> ${displayDate}`;
        document.getElementById('detail-desc').textContent = item.description || '这一天没有任何描述文字。';

        // Render tags
        let tagsHTML = '';
        if (Array.isArray(item.tags)) {
          item.tags.forEach(tag => {
            if (tag.trim()) {
              tagsHTML += `<span class="card-tag">#${tag}</span>`;
            }
          });
        }
        document.getElementById('detail-tags').innerHTML = tagsHTML;

        // Calculate event countdown/countup pill
        let pillText = '';
        let pillClass = '';
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        // helper for yearly events status
        function getYearlyEventStatus(eventDateStr) {
          const t = new Date();
          t.setHours(0, 0, 0, 0);
          const evDate = new Date(eventDateStr + 'T00:00:00');
          const evMonth = evDate.getMonth();
          const evDay = evDate.getDate();
          
          let targetYear = t.getFullYear();
          let currentAnnYear = new Date(targetYear, evMonth, evDay);
          
          if (currentAnnYear < t) {
            targetYear += 1;
          }
          
          const nextAnnDate = new Date(targetYear, evMonth, evDay);
          const diffTime = nextAnnDate - t;
          const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) % 365;
          const anniversaryIndex = targetYear - evDate.getFullYear();
          
          return { daysLeft, anniversaryIndex };
        }

        if (hasEndDate) {
          // Time range / duration event
          const startDate = new Date(item.date + 'T00:00:00');
          const endDate = new Date(item.endDate + 'T00:00:00');
          startDate.setHours(0, 0, 0, 0);
          endDate.setHours(0, 0, 0, 0);

          if (today < startDate) {
            // 1. Not started yet
            pillClass = 'countdown';
            const diffTime = startDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            pillText = `倒计时 ${diffDays} 天开始 ⏳`;
          } else if (today >= startDate && today <= endDate) {
            // 2. In progress
            pillClass = 'in-progress';
            const currentDay = Math.floor((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const totalDays = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
            pillText = `进行中 (第 ${currentDay}/${totalDays} 天) ❤️`;
          } else {
            // 3. Completed
            pillClass = 'countup';
            const diffTime = today - endDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const durationDays = Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
            pillText = `已过去 ${diffDays} 天 (历时 ${durationDays} 天) ✨`;
          }
        } else if (item.type === 'yearly') {
          const { daysLeft, anniversaryIndex } = getYearlyEventStatus(item.date);
          const isBirthday = item.title.includes('生日') || (Array.isArray(item.tags) && item.tags.includes('生日'));
          if (daysLeft === 0) {
            pillClass = 'countup';
            pillText = isBirthday ? `今天生日啦！🎂 (满 ${anniversaryIndex} 岁)` : `今天第 ${anniversaryIndex} 周年纪念 ❤️`;
          } else {
            pillClass = 'countdown';
            pillText = isBirthday 
              ? `距离生日还有 ${daysLeft} 天 (将满 ${anniversaryIndex} 岁)` 
              : `还有 ${daysLeft} 天 (第 ${anniversaryIndex} 周年)`;
          }
        } else {
          const eventDate = new Date(item.date + 'T00:00:00');
          eventDate.setHours(0, 0, 0, 0);
          const diffTime = today - eventDate;
          const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

          if (diffDays > 0) {
            pillClass = 'countup';
            pillText = `已过去 ${diffDays} 天`;
          } else if (diffDays === 0) {
            pillClass = 'countup';
            pillText = '就在今天 ❤️';
          } else {
            pillClass = 'countdown';
            pillText = `倒计时 ${Math.abs(diffDays)} 天`;
          }
        }

        const pillEl = document.getElementById('detail-pill');
        pillEl.textContent = pillText;
        pillEl.className = `card-days-pill ${pillClass}`;

        // Render photo stream vertically
        const itemImages = Array.isArray(item.images) ? item.images : (item.image ? [item.image] : []);
        const streamEl = document.getElementById('detail-photos-stream');
        if (itemImages.length > 0) {
          streamEl.classList.remove('hidden');
          let streamHTML = '';
          itemImages.forEach((imgUrl, index) => {
            streamHTML += `
              <div class="stream-photo-item" style="margin-bottom: 24px;">
                <img src="${imgUrl}" alt="${item.title} 照片 ${index + 1}" loading="lazy" style="max-height: none;">
              </div>
            `;
          });
          streamEl.innerHTML = streamHTML;
        } else {
          // Hide photo stream section if no photos
          streamEl.classList.add('hidden');
          const titleEl = document.querySelector('.photo-stream-title');
          if (titleEl) titleEl.style.display = 'none';
        }

      } catch (error) {
        console.error('Error fetching detail data:', error);
        document.getElementById('detail-title').textContent = '数据加载失败 💔';
      }
    });
  </script>
</body>
</html>
